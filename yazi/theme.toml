#:schema https://yazi-rs.github.io/schemas/theme.json

[flavor]
dark  = "gruvbox-dark"
light = "gruvbox-dark"

# Flat statusline (no Powerline arrows).
[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

[indicator]
padding = { open = "", close = "" }

[tabs]
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[which]
separator = " > "
