theme = "gruvbox_dark_hard"

[editor]
true-color = true
line-number = "relative"
cursorline = true
color-modes = true
scrolloff = 8
rulers = [80]
auto-format = false
default-yank-register = "+"
trim-trailing-whitespace = true
gutters = [
    "diagnostics",
    "spacer",
    "line-numbers",
    "spacer",
    "diff",
]

[editor.statusline]
left = [
    "mode",
    "file-name",
    "read-only-indicator",
    "file-modification-indicator",
]
right = [
    "diagnostics",
    "selections",
    "position",
    "total-line-numbers",
]

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true
