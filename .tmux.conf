# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -as terminal-features ",*:hyperlinks"
set-environment -g fish_features "no-query-term"

# Input and clipboard
set -g mouse on
set -g set-clipboard on

# General behavior
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
set -g display-panes-time 2000

# Window and pane indexing
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
setw -g monitor-activity on
set -g visual-activity off

# Clipboard integration
if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'set -s copy-command "pbcopy"'
if-shell 'command -v clip.exe >/dev/null 2>&1' \
    'set -s copy-command "clip.exe"'
if-shell 'command -v xsel >/dev/null 2>&1' \
    'set -s copy-command "xsel --clipboard --input"'
if-shell 'command -v xclip >/dev/null 2>&1' \
    'set -s copy-command "xclip -selection clipboard -in"'
if-shell 'command -v wl-copy >/dev/null 2>&1' \
    'set -s copy-command "wl-copy"'

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Window and pane creation
bind c new-window -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Window navigation
bind a last-window
bind S setw synchronize-panes

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

# Status line layout
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-left-length 50
set -g status-right-length 60
set -g window-status-separator " "

# Status line styles
set -g @status-bg '#{?client_prefix,bg=#504945,bg=#32302f}'
set -g @status-fg '#{?client_prefix,fg=#fbf1c7,fg=#ebdbb2}'
set -g status-style "#{E:@status-bg},#{E:@status-fg}"
set -g status-left-style "#{E:@status-bg},#{E:@status-fg}"
set -g status-right-style "#{E:@status-bg},#{E:@status-fg}"
set -g message-style "bg=#32302f,fg=#ebdbb2"
set -g mode-style "bg=#98971a,fg=#282828,bold"
set -g window-status-style "#{E:@status-bg},fg=#bdae93"
set -g window-status-current-style "#{E:@status-bg},fg=#98971a,bold"
setw -g window-status-activity-style "fg=#98971a,bold"

# Status line formats
set -g @window-flags '#{?window_flags,#{window_flags},}'
set -g @session-label '#[fg=#98971a,bold][#{session_name}] '
set -g @status-right-body \
    '#[fg=#98971a,bold]"#H" #[fg=#ebdbb2]%H:%M %d-%b-%y '

set -g window-status-format "#I:#W#{E:@window-flags} "
set -g window-status-current-format \
    "#I:#W#{E:@window-flags} "
set -g status-left "#{E:@session-label}"
set -g status-right "#{E:@status-right-body}"
