# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -as terminal-features ",*:hyperlinks"
set-environment -g fish_features "no-query-term"

# Input and clipboard
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g set-clipboard on

# General behavior
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
set -g display-panes-time 2000

# Window and pane indexing
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
set -g set-titles on
set -g set-titles-string '#{pane_title}'
setw -g monitor-activity on
set -g visual-activity off

# Clipboard integration
if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'set -s copy-command "pbcopy"'
if-shell 'command -v clip.exe >/dev/null 2>&1' \
    'set -s copy-command "clip.exe"'
if-shell 'command -v xsel >/dev/null 2>&1' \
    'set -s copy-command "xsel --clipboard --input"'
if-shell 'command -v xclip >/dev/null 2>&1' \
    'set -s copy-command "xclip -selection clipboard -in"'
if-shell 'command -v wl-copy >/dev/null 2>&1' \
    'set -s copy-command "wl-copy"'

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Window and pane creation
bind c new-window -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Window navigation
bind a last-window
bind S setw synchronize-panes

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

# Status line layout
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g window-status-separator ""

# Status line styles
# Gruvbox Dark Hard palette.
# Layout: [session|mode] [windows...] ... [host] [full time]
set -g @mode-bg '#{?client_prefix,#fabd2f,#{?pane_in_mode,#83a598,#b8bb26}}'

set -g status-style "bg=#1d2021,fg=#ebdbb2"
set -g status-left-style "bg=#1d2021,fg=#ebdbb2"
set -g status-right-style "bg=#1d2021,fg=#ebdbb2"
set -g message-style "bg=#3c3836,fg=#ebdbb2"
set -g mode-style "bg=#83a598,fg=#1d2021,bold"
set -g window-status-style "bg=#3c3836,fg=#ebdbb2"
set -g window-status-current-style "bg=#fabd2f,fg=#1d2021,bold"
setw -g window-status-activity-style "bg=#1d2021,fg=#d65d0e,bold"

# Status line formats
set -g window-status-format \
    '#[bg=#3c3836,fg=#ebdbb2] #I:#W '
set -g window-status-current-format \
    '#[bg=#fabd2f,fg=#1d2021,bold] #I:#W '
set -g status-left ''
set -ag status-left \
    '#[bg=#{E:@mode-bg},fg=#1d2021,bold] '
set -ag status-left \
    '#{?client_prefix,PREFIX,#{?pane_in_mode,COPY,#S}} '

set -g status-right ''
set -ag status-right \
    '#[bg=#3c3836,fg=#ebdbb2] #H '
set -ag status-right \
    '#[bg=#{E:@mode-bg},fg=#1d2021,bold] %Y-%m-%d %H:%M '
