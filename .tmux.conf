# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -as terminal-features ",*:hyperlinks"

# Input and clipboard
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g set-clipboard on

# General behavior
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
set -g display-panes-time 2000

# Window and pane indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Clipboard integration
if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'set -s copy-command "pbcopy"'
if-shell 'command -v clip.exe >/dev/null 2>&1' \
    'set -s copy-command "clip.exe"'
if-shell 'command -v xsel >/dev/null 2>&1' \
    'set -s copy-command "xsel --clipboard --input"'
if-shell 'command -v xclip >/dev/null 2>&1' \
    'set -s copy-command "xclip -selection clipboard -in"'
if-shell 'command -v wl-copy >/dev/null 2>&1' \
    'set -s copy-command "wl-copy"'

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Window and pane creation
bind c new-window -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Window navigation
bind a last-window
bind S setw synchronize-panes

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{copy-command}"
bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel "#{copy-command}"

# Status line and windows
set -g status-position top
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y-%m-%d #[fg=colour233,bg=colour245,bold] %H:%M '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
