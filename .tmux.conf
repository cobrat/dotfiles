# Terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set-environment -g fish_features "no-query-term"
set -g mouse on
set -g set-clipboard on

# General settings
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
set -g display-panes-time 2000

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Window/Pane creation with current path
bind c new-window -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Switch to last active window
bind a last-window

# Synchronize panes toggle
bind S set-window-option synchronize-panes

# Vim-like pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Indexing and activity
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
setw -g monitor-activity on
set -g visual-activity off

# Copy mode (Vim style)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel "pbcopy"

# Pane border styling
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

# --- Status line customization ---

# Position and basic style
set -g status-position top
set -g status-justify left
set -g status-style "bg=#32302f,fg=#ebdbb2"
set -g message-style "bg=#32302f,fg=#ebdbb2"
set -g mode-style "bg=#98971a,fg=#282828,bold"
set -g window-status-separator " "
set -g window-status-style "bg=#32302f,fg=#bdae93"
set -g window-status-current-style "bg=#32302f,fg=#98971a,bold"

# Window status format (Unfocused)
set -g window-status-format "#[fg=#bdae93] #I:#W#{?window_flags,#{window_flags},} "

# Window status format (Focused)
set -g window-status-current-format "#[fg=#98971a,bold] #I:#W#{?window_flags,#{window_flags},} "

# Status Left: Session name or Prefix indicator
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[bg=#98971a#,fg=#282828#,bold] PREFIX #[default],}#[fg=#98971a,bold][#{session_name}] "

# Status Right: Date and Time
set -g status-right-length 60
set -g status-right "#[fg=#98971a,bold]\"#H\" #[fg=#ebdbb2]%H:%M %d-%b-%y "

# Refresh interval
set -g status-interval 5

# Activity visual
setw -g window-status-activity-style "fg=#98971a,bold"
